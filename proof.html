<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>RANDOMIUM — 座標証明</title>
<!--
  座標証明 (Certificate) — 第三者が cid で作品の真正性を検証する買い手向けページ。
  デザイン言語: ブルータリスト (designs/brand/brutalist/take3/b8v3-04-proof.png)。白地・黒罫線・官報の静けさ。
  台帳 (designs/ledger/design-ledger.csv) を唯一の正として fetch し canonical_id で照合するだけ (サーバ/DB 無し)。
  使い方: proof.html?cid=Cxxxxxxxx / edition・status は台帳が正・ここは表示専用。docs/VALIDATION_BUILD_SPEC.md §3.5。
-->
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:#fff; color:#000;
    font-family:"Helvetica Neue", Helvetica, Arial, system-ui, sans-serif; }
  a{ color:#000; }
  .band{ border-bottom:2px solid #000; display:flex; align-items:center; gap:18px; padding:12px 18px; }
  .wordmark{ font-weight:800; font-size:19px; letter-spacing:0.01em; text-decoration:none; color:#000; }
  .nav{ margin-left:auto; display:flex; gap:16px; font-size:12.5px; font-weight:700; letter-spacing:0.04em; }
  main{ max-width:860px; margin:0 auto; padding:36px 18px 64px; }
  .kicker{ font-size:11px; letter-spacing:0.28em; margin:0 0 6px; font-weight:700; }
  h1{ font-size:26px; font-weight:800; margin:0 0 20px; letter-spacing:0.01em; line-height:1.3; }
  table.cert{ width:100%; border-collapse:collapse; border:2px solid #000; }
  .cert th, .cert td{ border:1.5px solid #000; padding:13px 14px; text-align:left; vertical-align:top; font-size:13.5px; }
  .cert th{ width:170px; font-weight:700; letter-spacing:0.04em; white-space:nowrap; }
  .cert td.mono{ font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12.5px; word-break:break-all; }
  .retired{ font-weight:800; text-decoration:underline; }
  .prep{ color:#555; }
  .seal{ margin:18px 0 0; font-size:11.5px; color:#333; line-height:1.8; }
  .seal b{ color:#000; }
  .openlink{ display:inline-block; margin-top:18px; font-size:14px; font-weight:700; }
  .empty{ border:2px solid #000; padding:22px; font-size:13px; line-height:1.85; }
  .cid{ font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#444;
    margin:0 0 16px; word-break:break-all; }
  @media (max-width:560px){ .cert th{ width:auto; } .cert th, .cert td{ padding:10px 10px; font-size:12.5px; } }
</style>
</head>
<body>
  <header class="band">
    <a class="wordmark" href="index.html">RANDOMIUM</a>
    <nav class="nav"><a href="index.html">EXPLORE</a><a href="ledger.html">LEDGER</a></nav>
  </header>
  <main>
    <p class="kicker">座標証明 — CERTIFICATE</p>
    <div id="body"><p class="empty">照合しています…</p></div>
    <p class="seal">この証明は作品台帳 (design-ledger) を唯一の正として照合しています。座標は数式 (FBM ノイズ + ドメインワーピング + 決定論ハッシュ) から生成された、AI 学習データを使わない<b>自作アルゴリズムの決定論的出力</b>です。同じ座標を入力すれば誰でも同じ景色を再現できます。</p>
  </main>
<script>
'use strict';
// tiny CSV parser (quoted fields with commas / escaped quotes)
function parseCSV(text){
  const rows=[]; let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; } else field+=c; }
    else if(c==='"') q=true;
    else if(c===','){ row.push(field); field=''; }
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n') i++; if(field!==''||row.length){ row.push(field); rows.push(row); row=[]; field=''; } }
    else field+=c;
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  return rows;
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const cid = (new URLSearchParams(location.search).get('cid')||'').trim();
const body = document.getElementById('body');

function notFound(msg){
  body.innerHTML = '<h1>この座標は未発行です</h1>'
    + (cid?('<p class="cid">'+esc(cid)+'</p>'):'')
    + '<div class="empty">'+esc(msg||'指定された座標は、まだ作品として台帳に登録されていません。探索して見つけた景色は「Register coordinate」から先行予約のご希望を送れます。')
    + ' <a href="index.html">探索する →</a></div>';
}

if(!cid){ notFound('URL に ?cid=... を付けて開いてください (例: proof.html?cid=C1a2b3c4d)。'); }
else {
  fetch('designs/ledger/design-ledger.csv', {cache:'no-store'})
    .then(r=>{ if(!r.ok) throw new Error('ledger fetch '+r.status); return r.text(); })
    .then(text=>{
      const rows = parseCSV(text);
      if(!rows.length){ notFound(); return; }
      const head = rows[0]; const gi = n => head.indexOf(n);
      const ci = gi('canonical_id');
      if(ci<0){ notFound('台帳に canonical_id 列がありません。'); return; }
      let rec=null;
      for(let i=1;i<rows.length;i++){ if((rows[i][ci]||'').trim()===cid){ rec=rows[i]; break; } }
      if(!rec){ notFound(); return; }

      const g = n => { const i=gi(n); return i>=0 ? (rec[i]||'') : ''; };
      const status = g('status'); const edition = g('edition'); const coordRaw = g('coord_raw');
      const isPublic = status==='released' || status==='retired';

      if(!isPublic){
        body.innerHTML = '<h1>'+esc(g('title')||'（無題）')+'</h1>'
          + '<p class="cid">'+esc(cid)+'</p>'
          + '<div class="empty prep">この座標は作品として選定・準備中です。公開まではエディションや販売状態は確定していません。</div>';
        return;
      }

      const statusHtml = status==='retired'
        ? '<span class="retired">RETIRED（完売・再販なし）</span>'
        : '販売中';
      const sealNever = /1of1/.test(edition) || status==='retired';
      const coordCell = 'X ' + esc(g('world_x')) + ' / Y ' + esc(g('world_y')) + ' / Z ' + esc(g('log_zoom'));

      body.innerHTML = '<h1>'+esc(g('title')||'（無題）')+'</h1>'
        + '<table class="cert">'
        + '<tr><th>作品ID</th><td class="mono">'+esc(g('id'))+'</td></tr>'
        + '<tr><th>タイトル</th><td>'+esc(g('title')||'—')+'</td></tr>'
        + '<tr><th>COORDINATE</th><td class="mono">'+coordCell+'</td></tr>'
        + '<tr><th>seed</th><td class="mono">'+esc(g('seed'))+'</td></tr>'
        + '<tr><th>座標キー</th><td class="mono">'+esc(cid)+'</td></tr>'
        + '<tr><th>EDITION</th><td>'+esc(edition||'—')+'</td></tr>'
        + '<tr><th>STATUS</th><td>'+statusHtml+'</td></tr>'
        + '<tr><th>LEDGER</th><td>VERIFIED — 台帳と照合一致</td></tr>'
        + '</table>'
        + (sealNever ? '<p class="seal"><b>この座標・この書き出し設定の一点物は、二度と販売されません。</b></p>' : '')
        + (coordRaw ? '<a class="openlink" href="index.html'+esc(coordRaw)+'">この座標を開く →</a>' : '');
    })
    .catch(err=>{ notFound('台帳を読み込めませんでした（'+esc(err.message)+'）。ホスティング環境でお試しください。'); });
}
</script>
</body>
</html>
